<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agentic Vault</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='3.2' y='3.2' width='9.6' height='9.6' rx='1.4' transform='rotate(45 8 8)' fill='none' stroke='%2335c9e0' stroke-width='1.6'/%3E%3Ccircle cx='8' cy='8' r='1.8' fill='%2335c9e0'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3.2" y="3.2" width="9.6" height="9.6" rx="1.4" transform="rotate(45 8 8)" stroke="var(--accent-ink)" stroke-width="1.5"/><circle cx="8" cy="8" r="1.7" fill="var(--accent-ink)"/></svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">Agentic Vault</span>
        <span class="brand-sub">notes · memory · agent</span>
      </div>
    </div>

    <div class="side-pad">
      <button class="new-chat" id="newChatBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3.3v9.4M3.3 8h9.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        New conversation
      </button>
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.3" stroke="currentColor" stroke-width="1.5"/><path d="m10.4 10.4 2.6 2.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input id="searchInput" placeholder="Search conversations" />
      </div>
    </div>

    <nav class="history" id="history"></nav>

    <div class="side-footer">
      <div class="vault-stat">
        <div class="vs-ic">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 4.2c0-.66.54-1.2 1.2-1.2H8l1.4 1.4h2.4c.66 0 1.2.54 1.2 1.2v6c0 .66-.54 1.2-1.2 1.2H4.2c-.66 0-1.2-.54-1.2-1.2V4.2Z" stroke="currentColor" stroke-width="1.3"/></svg>
        </div>
        <div class="vs-meta">
          <div class="vs-top">Your vault</div>
          <div class="vs-sync"><span class="pulse"></span>connected</div>
        </div>
      </div>
      <div class="user-row">
        <div class="avatar">me</div>
        <div class="user-meta"><div class="user-name">meowy</div></div>
        <button class="logout-btn" id="logoutBtn">log out</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="agent-pick">
        <span class="ap-mark"></span>
        <span class="ap-name">Vault Agent <span>v2</span></span>
      </div>
      <div class="topbar-title"><div class="tt-main" id="topTitle">New conversation</div></div>
    </header>

    <div class="scroll" id="scroll">
      <div class="thread" id="thread"></div>
    </div>

    <div class="composer-wrap">
      <div class="composer-inner">
        <div class="composer" id="composer">
          <div class="comp-text-row">
            <textarea id="input" rows="1" placeholder="Ask your vault anything…"></textarea>
          </div>
          <div class="comp-bar">
            <div class="comp-spacer"></div>
            <button class="send" id="send" disabled title="Send">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 13V3.5m0 0L4 7.5M8 3.5l4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
        <div class="disclaimer">Vault Agent searches your notes, does math, and checks the time · verify important results</div>
      </div>
    </div>
  </main>
</div>
<script src="/static/app.js"></script>
</body>
</html>
